# ──────────────────────────────────────────────
# Global
# ──────────────────────────────────────────────
global:
  registry: docker.artifactory-dogen.group.echonet
  imagePullSecret: image-pull-secret
  namespace: monitoring-datahub-v2

# ──────────────────────────────────────────────
# Backend – FastAPI (port 8081)
# ──────────────────────────────────────────────
backend:
  name: datahub-v2-backend
  image:
    repository: docker.artifactory-dogen.group.echonet/datahub-v2-monitoring-backend
    tag: "latest"
    pullPolicy: Always

  replicaCount: 1

  service:
    type: ClusterIP
    port: 8081

  resources:
    requests:
      cpu: "200m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

  env:
    APP_ENV: "production"
    LOG_LEVEL: "info"

  cosSecret:
    secretName: cos-credentials
    keys:
      COS_ENDPOINT: COS_ENDPOINT
      COS_API_KEY: COS_API_KEY
      COS_INSTANCE_CRN: COS_INSTANCE_CRN
      COS_BUCKET: COS_BUCKET

  livenessProbe:
    path: /health
    initialDelaySeconds: 15
    periodSeconds: 20

  readinessProbe:
    path: /health
    initialDelaySeconds: 10
    periodSeconds: 10

# ──────────────────────────────────────────────
# Frontend – React/Vite servi par Nginx (port 8080)
# ──────────────────────────────────────────────
frontend:
  name: datahub-v2-frontend
  image:
    repository: docker.artifactory-dogen.group.echonet/datahub-v2-monitoring-frontend
    tag: "latest"
    pullPolicy: Always

  replicaCount: 1

  service:
    type: ClusterIP
    port: 8080

  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "200m"
      memory: "256Mi"

  nginx:
    configMapName: nginx-config
    mainConfigMapName: nginx-main-config

  livenessProbe:
    path: /
    initialDelaySeconds: 10
    periodSeconds: 20

  readinessProbe:
    path: /
    initialDelaySeconds: 5
    periodSeconds: 10

# ──────────────────────────────────────────────
# Ingress
# ──────────────────────────────────────────────
ingress:
  enabled: true
  className: "nginx"
  host: datahub-v2-monitoring.a101731.bnpparibas.com
  tls:
    enabled: false       # Passer à true si cert disponible
    secretName: datahub-v2-tls
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"

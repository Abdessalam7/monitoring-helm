apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.backend.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    app: {{ .Values.backend.name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.backend.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.backend.name }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      imagePullSecrets:
        - name: {{ .Values.global.imagePullSecret }}

      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8081
              protocol: TCP

          envFrom:
            - configMapRef:
                name: backend-config

          env:
            - name: COS_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backend.cosSecret.secretName }}
                  key: {{ .Values.backend.cosSecret.keys.COS_ENDPOINT }}
            - name: COS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backend.cosSecret.secretName }}
                  key: {{ .Values.backend.cosSecret.keys.COS_API_KEY }}
            - name: COS_INSTANCE_CRN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backend.cosSecret.secretName }}
                  key: {{ .Values.backend.cosSecret.keys.COS_INSTANCE_CRN }}
            - name: COS_BUCKET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backend.cosSecret.secretName }}
                  key: {{ .Values.backend.cosSecret.keys.COS_BUCKET }}

          livenessProbe:
            httpGet:
              path: {{ .Values.backend.livenessProbe.path }}
              port: 8081
            initialDelaySeconds: {{ .Values.backend.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.backend.livenessProbe.periodSeconds }}

          readinessProbe:
            httpGet:
              path: {{ .Values.backend.readinessProbe.path }}
              port: 8081
            initialDelaySeconds: {{ .Values.backend.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.backend.readinessProbe.periodSeconds }}

          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}

# ============================================================================
# À AJOUTER dans ton values.yaml existant
# ============================================================================

# ----- 1. Corriger le bloc image (si la registry est fausse) -----
image:
  repository: private.fr2.icr.io/a101731-hprd/pysmoke-test
  tag: main
  pullPolicy: Always

# ----- 2. Remplacer/compléter le bloc env existant -----
env:
  - name: ENV
    value: "dev"
  - name: PYTHONUNBUFFERED
    value: "1"

  # Paramètres pysmoke
  - name: TARGET
    value: "hprd"
  - name: ENV_LIST
    value: "dev,int,qual"
  - name: SERVICE
    value: "airflow"
  - name: HTTP_TIMEOUT
    value: "10"
  - name: INSTANCES_CONFIG_PATH
    value: "/etc/pysmoke-test/instances.json"
  - name: LOCAL_OUTPUT_PATH
    value: "/tmp/status.json"
  - name: COS_OBJECT_KEY
    value: "monitoring-web/input/airflow/status.json"

  # Credentials COS injectés depuis le Secret existant `cos-credentials`
  - name: COS_ENDPOINT
    valueFrom:
      secretKeyRef:
        name: cos-credentials
        key: COS_ENDPOINT
  - name: COS_BUCKET_NAME
    valueFrom:
      secretKeyRef:
        name: cos-credentials
        key: COS_BUCKET_NAME
  - name: COS_REGION
    valueFrom:
      secretKeyRef:
        name: cos-credentials
        key: COS_REGION
  - name: COS_ACCESS_KEY_ID
    valueFrom:
      secretKeyRef:
        name: cos-credentials
        key: COS_ACCESS_KEY_ID
  - name: COS_SECRET_ACCESS_KEY
    valueFrom:
      secretKeyRef:
        name: cos-credentials
        key: COS_SECRET_ACCESS_KEY

# ----- 3. Ajouter les volumes (nouveau, à ajouter à la fin de values.yaml) -----
volumes:
  - name: instances-config
    configMap:
      name: pysmoke-instances   # Doit matcher le {{ include "pysmoke.fullname" . }}-instances rendu
      items:
        - key: instances.json
          path: instances.json

volumeMounts:
  - name: instances-config
    mountPath: /etc/pysmoke-test
    readOnly: true

# ----- 4. Nouvelle section : la liste des instances à checker -----
# Copie ici le contenu de ta Variable Airflow `project_config_<target>`
# (celle utilisée par FromJsonConfig)
smokeTest:
  instances:
    aidi:
      dev:
        - APP_CODE: "a101731"
          ENV: "dev"
          RELEASE_UUID: "53d53716"
          VERSION: "3.4.1"
    arval:
      dev:
        - APP_CODE: "ap50708"
          ENV: "dev"
          RELEASE_UUID: "41b1560f"
          VERSION: "3.3.3"
      qual:
        - APP_CODE: "ap50708"
          ENV: "qual"
          RELEASE_UUID: "91816d23"
          VERSION: "3.4.1"
    bcef:
      dev:
        - APP_CODE: "a100885"
          ENV: "dev"
          RELEASE_UUID: "f35f33d7"
          VERSION: "3.5.2"
    # ... ajoute toutes les autres business_line / envs / instances

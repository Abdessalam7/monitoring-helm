apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pysmoke.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "pysmoke.name" . }}
    helm.sh/chart: {{ printf "%s-%s" .Chart.Name .Chart.Version }}
spec:
  replicas: {{ default 1 .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "pysmoke.name" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "pysmoke.name" . }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "pysmoke.serviceAccountName" . }}
      {{- if .Values.securityContext.enabled }}
      securityContext:
        {{- with .Values.securityContext.runAsNonRoot }}
        runAsNonRoot: {{ . }}
        {{- end }}
        {{- with .Values.securityContext.runAsUser }}
        runAsUser: {{ . }}
        {{- end }}
        {{- with .Values.securityContext.runAsGroup }}
        runAsGroup: {{ . }}
        {{- end }}
        {{- with .Values.securityContext.fsGroup }}
        fsGroup: {{ . }}
        {{- end }}
      {{- end }}
      containers:
        - name: pysmoke
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          workingDir: /app
          {{- with .Values.command }}
          {{- if kindIs "string" . }}
          command: [{{ . | quote }}]
          {{- else if kindIs "slice" . }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- end }}
          {{- with .Values.args }}
          {{- if kindIs "string" . }}
          args: [{{ . | quote }}]
          {{- else if kindIs "slice" . }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- end }}
          {{- with .Values.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.volumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.volumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}

image:
  repository: private.fr2.icr.io/a101731-hprd/pysmoke-test
  tag: main
  pullPolicy: Always

env:
  - name: ENV
    value: "dev"
  - name: PYTHONUNBUFFERED
    value: "1"

  # Paramètres pysmoke
  - name: TARGET
    value: "hprd"
  - name: ENV_LIST
    value: "dev,int,qual"
  - name: SERVICE
    value: "airflow"
  - name: HTTP_TIMEOUT
    value: "10"
  - name: INSTANCES_CONFIG_PATH
    value: "/etc/pysmoke-test/instances.json"
  - name: LOCAL_OUTPUT_PATH
    value: "/tmp/status.json"
  - name: COS_OBJECT_KEY
    value: "monitoring-web/input/airflow/status.json"

  # Credentials COS injectés depuis le Secret existant `cos-credentials`
  - name: COS_ENDPOINT
    valueFrom:
      secretKeyRef:
        name: cos-credentials
        key: COS_ENDPOINT
  - name: COS_BUCKET_NAME
    valueFrom:
      secretKeyRef:
        name: cos-credentials
        key: COS_BUCKET_NAME
  - name: COS_REGION
    valueFrom:
      secretKeyRef:
        name: cos-credentials
        key: COS_REGION
  - name: COS_ACCESS_KEY_ID
    valueFrom:
      secretKeyRef:
        name: cos-credentials
        key: COS_ACCESS_KEY_ID
  - name: COS_SECRET_ACCESS_KEY
    valueFrom:
      secretKeyRef:
        name: cos-credentials
        key: COS_SECRET_ACCESS_KEY

command: ["python", "-u", "scripts/main.py"]
args: []
resources: {}

nodeSelector: {}
tolerations: []
affinity: {}

serviceAccount:
  create: true
  name: "pysmoke"
  annotations:
    cert-manager.io/issuer: datalab-cloud-echonet-issuer
    cert-manager.io/issuer-group: horizon.evertrust.io
    cert-manager.io/issuer-kind: ClusterIssuer

imagePullSecrets:
  - name: image-pull-secret

podAnnotations: {}

securityContext:
  enabled: true
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

volumes:
  - name: instances-config
    configMap:
      name: pysmoke-test-pysmoke-instances
      items:
        - key: instances.json
          path: instances.json

volumeMounts:
  - name: instances-config
    mountPath: /etc/pysmoke-test
    readOnly: true

# ============================================================================
# Liste des instances Airflow : voir le fichier `instances.json` à la racine
# de la chart (au même niveau que ce values.yaml).
# Copy-paste direct depuis la Variable Airflow `airflowctl_inst_list_json`.
# ============================================================================
